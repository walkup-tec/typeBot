# Easypanel / Nixpacks — API (monorepo typeBot)
[variables]
NIXPACKS_NODE_VERSION = "22"

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = [
  "npm run build:api",
  "test -f apps/api/dist/deploy-marker.js || (echo 'ERRO: build sem deploy-marker — git desatualizado' && exit 1)",
  "grep -q API_DEPLOY_MARKER apps/api/dist/deploy-marker.js || (echo 'ERRO: deploy-marker invalido no dist' && exit 1)",
]

[start]
cmd = "npm run start:api"
